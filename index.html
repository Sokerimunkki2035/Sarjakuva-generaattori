<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarjakuva-editori Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .controls { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 10px; width: 100%; max-width: 800px; }
        .row { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
        button { padding: 8px 12px; border: 1px solid #ccc; background: #eee; cursor: pointer; border-radius: 4px; }
        button:active { background: #ddd; }
        select { padding: 8px; border-radius: 4px; }
        canvas { border: 2px solid #333; background: #fff; max-width: 100%; height: auto !important; }
        .delete-btn { background: #ff4444; color: white; border: none; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="row">
            <strong>Hahmo:</strong>
            <select id="gender">
                <option value="blue">Mies / Poika</option>
                <option value="pink">Nainen / Tyttö</option>
            </select>
            <select id="bodyType">
                <option value="0.5">Hoikka</option>
                <option value="0.8">Vatsakas</option>
                <option value="1.2">Pullea</option>
            </select>
            <select id="height">
                <option value="1.5">Pitkä / Aikuinen</option>
                <option value="0.8">Lyhyt / Lapsi</option>
            </select>
            <button onclick="lisaaHahmo()" style="background: #4CAF50; color: white;">Lisää Hahmo</button>
        </div>
        
        <div class="row">
            <button onclick="lisaaTeksti()">Lisää Puhekupla/Teksti</button>
            <button onclick="lisaaSeina()">Lisää Seinä</button>
            <button onclick="poistaValittu()" class="delete-btn">Poista valittu</button>
            <button onclick="tallennaKuva()">Tallenna PNG</button>
        </div>
    </div>

    <canvas id="sarjisCanvas" width="800" height="500"></canvas>

    <script>
        // Alustetaan canvas ja sallitaan kosketuslaitteet
        const canvas = new fabric.Canvas('sarjisCanvas', {
            allowTouchScrolling: true,
            stopContextMenu: true
        });

        function lisaaHahmo() {
            const gender = document.getElementById('gender').value;
            const bodyWidthScale = parseFloat(document.getElementById('bodyType').value);
            const heightScale = parseFloat(document.getElementById('height').value);

            // Luodaan yksinkertainen hahmo palloista ja viivoista (ryhmänä)
            const paa = new fabric.Circle({ radius: 20, fill: gender, top: 0, left: 20 });
            const vartalo = new fabric.Rect({ 
                width: 40 * bodyWidthScale, 
                height: 60 * heightScale, 
                fill: gender, 
                top: 35, 
                left: 40 - (20 * bodyWidthScale) 
            });

            const hahmo = new fabric.Group([paa, vartalo], {
                left: 100,
                top: 100
            });

            canvas.add(hahmo);
            canvas.setActiveObject(hahmo);
        }

        function lisaaTeksti() {
            const teksti = new fabric.IText('Kirjoita tähän...', {
                left: 150,
                top: 50,
                fontFamily: 'Arial',
                fontSize: 24,
                backgroundColor: 'white'
            });
            canvas.add(teksti);
        }

        function lisaaSeina() {
            const seina = new fabric.Rect({
                left: 50, top: 50, fill: '#ccc', width: 100, height: 200, stroke: '#333'
            });
            canvas.add(seina);
        }

        function poistaValittu() {
            canvas.getActiveObjects().forEach(obj => canvas.remove(obj));
            canvas.discardActiveObject().renderAll();
        }

        function tallennaKuva() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = 'sarjakuva.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
