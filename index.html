<!DOCTYPE html>
<html>
<head>
    <title>Sarjakuva: Hahmo (ryhmitelty)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/3.6.2/fabric.min.js"></script>
    <style>
        body { margin: 20px; }
        #canvas-container { border: 1px solid black; }
        canvas { border: 1px solid gray; }
        button { padding: 10px 15px; margin: 5px; }
    </style>
</head>
<body>
    <button onclick="lisaaHahmo()">Lisää hahmo</button>
    <div id="canvas-container">
        <canvas id="canvas" width="600" height="400"></canvas>
    </div>

    <script>
        // Luodaan kanvaasi
        var canvas = new fabric.Canvas('canvas', {
            backgroundColor: 'white'
        });

        // Lisätään hahmo (pää + vartalo, ryhmitelty)
        function lisaaHahmo() {
            // Pää (ympyrä)
            var paa = new fabric.Circle({
                radius: 25,
                fill: 'blue',
                top: -25,
                left: 20
            });

            // Vartalo (suorakulmio)
            var vartalo = new fabric.Rect({
                width: 60,
                height: 100,
                fill: 'blue',
                top: 0,
                left: 0,
                rx: 10,
                ry: 10
            });

            // Ryhmitellään pää ja vartalo
            var hahmo = new fabric.Group([paa, vartalo], {
                left: 100,
                top: 100
            });

            canvas.add(hahmo);
        }
    </script>
</body>
</html>
