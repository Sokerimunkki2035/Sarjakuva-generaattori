<!DOCTYPE html>
<html>
<head>
    <title>Testi: Ympyrä</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/3.6.2/fabric.min.js"></script>
    <style>
        body { margin: 20px; }
        #canvas-container { border: 1px solid black; }
        canvas { border: 1px solid gray; }
    </style>
</head>
<body>
    <button onclick="lisaaYmpyra()">Lisää ympyrä</button>
    <div id="canvas-container">
        <canvas id="canvas" width="400" height="300"></canvas>
    </div>

    <script>
        // Luodaan kanvaasi
        var canvas = new fabric.Canvas('canvas', {
            backgroundColor: 'white'
        });

        // Lisätään ympyrä
        function lisaaYmpyra() {
            var ympyra = new fabric.Circle({
                radius: 30,
                fill: 'red',
                left: 100,
                top: 100
            });
            canvas.add(ympyra);
        }
    </script>
</body>
</html>
