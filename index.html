<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8">
    <title>Sarjakuva-editori</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/3.6.2/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        .controls { background: white; padding: 20px; border-radius: 10px; margin: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; gap: 10px; flex-wrap: wrap; }
        #canvas-container { border: 2px solid #333; background: white; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        .delete-btn { background: #dc3545; }
    </style>
</head>
<body>

    <div class="controls">
        <select id="characterSelect">
            <option value="aiti">Äiti (vasen ylä)</option>
            <option value="isa">Isä (oikea ylä)</option>
            <option value="poika1">Poika (vasen ala)</option>
            <option value="poika2">Poika kännykällä (oikea ala)</option>
        </select>
        <button onclick="lisaaHahmo()">Lisää hahmo</button>
        <button onclick="lisaaTeksti()">Lisää teksti (ilman kuplaa)</button>
        <button class="delete-btn" onclick="poistaValittu()">Poista valittu</button>
        <button style="background: #28a745;" onclick="tallennaKuva()">Tallenna sarjis</button>
    </div>

    <div id="canvas-container">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>

    <script>
        var canvas = new fabric.Canvas('canvas');

        // MUOKKAA TÄHÄN TIEDOSTON NIMI JONKA TALLENSIT GITHUBIIN
        const KUVATIEDOSTO = 'hahmot.png'; 

        function lisaaHahmo() {
            var valinta = document.getElementById('characterSelect').value;
            
            fabric.Image.fromURL(KUVATIEDOSTO, function(img) {
                // Määritellään jokaisen hahmon paikka isossa kuvassa (pikseleinä)
                // Nämä arvot riippuvat kuvasi koosta, voit joutua hienosäätämään näitä
                var x = 0, y = 0, w = img.width / 2, h = img.height / 2;

                if (valinta === 'isa') { x = w; y = 0; }
                if (valinta === 'poika1') { x = 0; y = h; }
                if (valinta === 'poika2') { x = w; y = h; }

                img.set({
                    left: 100,
                    top: 100,
                    width: w,
                    height: h,
                    cropX: x,
                    cropY: y,
                    scaleX: 0.8,
                    scaleY: 0.8
                });

                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            });
        }

        function lisaaTeksti() {
            var teksti = new fabric.IText('Kirjoita tähän...', {
                left: 200,
                top: 200,
                fontSize: 22,
                fontFamily: 'Arial',
                backgroundColor: 'rgba(255,255,255,0.7)' // Pieni taustaväri tekstille jos haluat
            });
            canvas.add(teksti);
        }

        function poistaValittu() {
            canvas.remove(canvas.getActiveObject());
        }

        function tallennaKuva() {
            var dataURL = canvas.toDataURL({ format: 'png' });
            var link = document.createElement('a');
            link.download = 'minun-sarjakuvani.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
