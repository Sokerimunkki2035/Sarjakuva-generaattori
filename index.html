<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarjakuva-editori</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }
        .controls {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            width: 95%;
            max-width: 700px;
        }
        .row {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 12px 16px;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fff;
            font-size: 14px;
            min-width: 120px;
        }

        #canvas-container {
            border: 3px solid #333;
            background: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        canvas {
            max-width: 100%;
            height: auto !important;
        }

        .btn-add {
            background: #2ecc71;
            color: white;
        }
        .btn-delete {
            background: #e74c3c;
            color: white;
        }
        .btn-save {
            background: #3498db;
            color: white;
        }

        label {
            font-size: 12px;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="row">
            <div class="input-group">
                <label>Sukupuoli</label>
                <select id="gender">
                    <option value="#3498db">Mies / Poika</option>
                    <option value="#e91e63">Nainen / Tyttö</option>
                </select>
            </div>
            <div class="input-group">
                <label>Vartalo</label>
                <select id="bodyType">
                    <option value="40">Hoikka</option>
                    <option value="70">Vatsakas</option>
                    <option value="100">Pullea</option>
                </select>
            </div>
            <div class="input-group">
                <label>Pituus</label>
                <select id="heightScale">
                    <option value="1.2">Pitkä (Aikuinen)</option>
                    <option value="0.7">Lyhyt (Lapsi)</option>
                </select>
            </div>
        </div>

        <div class="row">
            <button onclick="lisaaHahmo()" class="btn-add">Luo Hahmo</button>
            <button onclick="lisaaTeksti()">Lisää Teksti</button>
            <button onclick="lisaaSeina()">Lisää Seinä</button>
            <button onclick="poistaValittu()" class="btn-delete">Poista</button>
            <button onclick="tallennaKuva()" class="btn-save">Tallenna PNG</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="sarjisCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        var canvas;

        // Alustetaan sivu
        window.onload = function() {
            canvas = new fabric.Canvas('sarjisCanvas', {
                backgroundColor: '#ffffff'
            });
            canvas.renderAll();
        };

        function lisaaHahmo() {
            var vari = document.getElementById('gender').value;
            var leveys = parseInt(document.getElementById('bodyType').value);
            var pituusKerroin = parseFloat(document.getElementById('heightScale').value);

            var perusKorkeus = 100;
            var hahmonKorkeus = perusKorkeus * pituusKerroin;

            // Pää
            var paa = new fabric.Circle({
                radius: 25,
                fill: vari,
                top: 0,
                left: leveys / 2 - 25
            });

            // Vartalo
            var vartalo = new fabric.Rect({
                width: leveys,
                height: hahmonKorkeus,
                fill: vari,
                top: 50,
                left: 0,
                rx: 15,
                ry: 15
            });

            // Ryhmitellään osat, jotta ne liikkuvat yhtenä hahmona
            var hahmo = new fabric.Group([paa, vartalo], {
                left: 100,
                top: 100
            });

            canvas.add(hahmo);
            canvas.setActiveObject(hahmo);
            canvas.renderAll();
        }

        function lisaaTeksti() {
            var teksti = new fabric.IText('Kirjoita tähän...', {
                left: 150,
                top: 150,
                fontSize: 28,
                fontFamily: 'Arial',
                backgroundColor: 'rgba(255,255,255,0.8)'
            });
            canvas.add(teksti);
            canvas.setActiveObject(teksti);
            canvas.renderAll();
        }

        function lisaaSeina() {
            var seina = new fabric.Rect({
                left: 50,
                top: 50,
                fill: '#7f8c8d',
                width: 15,
                height: 250
            });
            canvas.add(seina);
            canvas.renderAll();
        }

        function poistaValittu() {
            var aktiiviset = canvas.getActiveObjects();
            if (aktiiviset.length > 0) {
                aktiiviset.forEach(function(obj) {
                    canvas.remove(obj);
                });
                canvas.discardActiveObject();
                canvas.renderAll();
            }
        }

        function tallennaKuva() {
            var dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1
            });
            var link = document.createElement('a');
            link.download = 'sarjakuva.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
