<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sarjakuva-editori Korjattu</title>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        .controls { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 10px; width: 95%; max-width: 600px; }
        .row { margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        button { padding: 10px; border: 1px solid #ccc; background: #eee; cursor: pointer; border-radius: 6px; font-size: 14px; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: white; font-size: 14px; }
        #canvas-container { border: 2px solid #333; background: #fff; line-height: 0; }
        canvas { max-width: 100%; height: auto !important; }
        .delete-btn { background: #ff4444; color: white; }
        .add-btn { background: #4CAF50; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <div class="row">
            <strong>Hahmo:</strong>
            <select id="gender">
                <option value="#3498db">Mies / Poika (Sininen)</option>
                <option value="#e91e63">Nainen / Tyttö (Punainen)</option>
            </select>
            <select id="bodyType">
                <option value="40">Hoikka</option>
                <option value="60">Vatsakas</option>
                <option value="80">Pullea</option>
            </select>
            <select id="height">
                <option value="100">Pitkä / Aikuinen</option>
                <option value="50">Lyhyt / Lapsi</option>
            </select>
        </div>
        
        <div class="row">
            <button onclick="lisaaHahmo()" class="add-btn">Lisää Hahmo</button>
            <button onclick="lisaaTeksti()">Lisää Teksti</button>
            <button onclick="lisaaSeina()">Lisää Seinä</button>
            <button onclick="poistaValittu()" class="delete-btn">Poista</button>
            <button onclick="tallennaKuva()">Tallenna PNG</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="sarjisCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        // Alustetaan canvas heti kun sivu on latautunut
        var canvas;
        window.onload = function() {
            canvas = new fabric.Canvas('sarjisCanvas', {
                backgroundColor: '#ffffff',
                isDrawingMode: false
            });
            // Pakotetaan renderöinti
            canvas.renderAll();
            console.log("Canvas alustettu");
        };

        function lisaaHahmo() {
            var vari = document.getElementById('gender').value;
            var leveys = parseInt(document.getElementById('bodyType').value);
            var korkeus = parseInt(document.getElementById('height').value);

            // Luodaan vartalo suorakulmiona
            var vartalo = new fabric.Rect({
                left: 100,
                top: 150,
                fill: vari,
                width: leveys,
                height: korkeus,
                rx: 10, // Pyöristetyt kulmat
                ry: 10
            });

            // Luodaan pää pallona
            var paa = new fabric.Circle({
                left: 100 + (leveys/2) - 25,
                top: 150 - 45,
                fill: vari,
                radius: 25
            });

            // Lisätään molemmat kankaalle
            canvas.add(vartalo);
            canvas.add(paa);
            canvas.setActiveObject(vartalo);
            canvas.renderAll();
        }

        function lisaaTeksti() {
            var teksti = new fabric.IText('Kirjoita...', {
                left: 200,
                top: 100,
                fontSize: 25,
                fontFamily: 'Arial'
            });
            canvas.add(teksti);
            canvas.setActiveObject(teksti);
        }

        function lisaaSeina() {
            var seina = new fabric.Rect({
                left: 50, top: 50, fill: '#888', width: 20, height: 200
            });
            canvas.add(seina);
        }

        function poistaValittu() {
            var activeObjects = canvas.getActiveObjects();
            canvas.discardActiveObject();
            if (activeObjects.length) {
                canvas.remove.apply(canvas, activeObjects);
            }
            canvas.renderAll();
        }

        function tallennaKuva() {
            var dataURL = canvas.toDataURL({ format: 'png' });
            var link = document.createElement('a');
            link.download = 'sarjakuva.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
