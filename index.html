<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8">
    <title>Sarjakuva: Ihmishahmot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/3.6.2/fabric.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        select, button {
            padding: 10px;
            margin: 5px;
        }
        #canvas-container {
            border: 1px solid black;
        }
        canvas {
            border: 1px solid gray;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div>
            <label>Sukupuoli:</label>
            <select id="gender">
                <option value="#3498db">Mies / Poika</option>
                <option value="#e91e63">Nainen / Tyttö</option>
            </select>
        </div>
        <div>
            <label>Vartalo:</label>
            <select id="bodyType">
                <option value="40">Hoikka</option>
                <option value="70">Vatsakas</option>
                <option value="100">Pullea</option>
            </select>
        </div>
        <div>
            <label>Pituus:</label>
            <select id="heightScale">
                <option value="1.2">Pitkä (Aikuinen)</option>
                <option value="0.7">Lyhyt (Lapsi)</option>
            </select>
        </div>
    </div>
    <div class="controls">
        <button onclick="lisaaHahmo()">Lisää hahmo</button>
        <button onclick="lisaaPuhekupla()">Lisää puhekupla</button>
        <button onclick="lisaaTeksti()">Lisää teksti</button>
        <button onclick="lisaaSeina()">Lisää seinä</button>
        <button onclick="poistaValittu()">Poista valittu</button>
        <button onclick="tallennaKuva()">Tallenna kuva</button>
    </div>
    <div id="canvas-container">
        <canvas id="canvas" width="800" height="500"></canvas>
    </div>

    <script>
        var canvas = new fabric.Canvas('canvas', {
            backgroundColor: 'white'
        });

        // Lisää hahmo (ihmishahmo)
        function lisaaHahmo() {
            var vari = document.getElementById('gender').value;
            var leveys = parseInt(document.getElementById('bodyType').value);
            var pituusKerroin = parseFloat(document.getElementById('heightScale').value);
            var perusKorkeus = 120;
            var hahmonKorkeus = perusKorkeus * pituusKerroin;

            // Pää (pyöreä, kasvoilla piirteet)
            var paa = new fabric.Circle({
                radius: 30,
                fill: vari,
                top: -30,
                left: leveys / 2 - 30
            });

            // Silmät (2 ympyrää)
            var silma1 = new fabric.Circle({
                radius: 5,
                fill: 'black',
                top: -38,
                left: leveys / 2 - 20
            });

            var silma2 = new fabric.Circle({
                radius: 5,
                fill: 'black',
                top: -38,
                left: leveys / 2 + 10
            });

            // Suu (viiva)
            var suu = new fabric.Line([leveys / 2 - 15, -20, leveys / 2 + 15, -20], {
                stroke: 'black',
                strokeWidth: 2,
                top: -25
            });

            // Vartalo (yksinkertainen, pyöristetty)
            var vartalo = new fabric.Rect({
                width: leveys,
                height: hahmonKorkeus,
                fill: vari,
                top: 0,
                left: 0,
                rx: 15,
                ry: 15
            });

            // Ryhmitellään kaikki osat
            var hahmo = new fabric.Group([paa, silma1, silma2, suu, vartalo], {
                left: 100,
                top: 100
            });

            canvas.add(hahmo);
            canvas.setActiveObject(hahmo);
            canvas.renderAll();
        }

        // Lisää puhekupla
        function lisaaPuhekupla() {
            var puhekupla = new fabric.Path(
                'M 50 0 Q 100 -50 150 0 L 150 50 Q 100 100 50 50 Z',
                {
                    fill: 'white',
                    stroke: 'black',
                    strokeWidth: 2,
                    left: 200,
                    top: 50
                }
            );

            canvas.add(puhekupla);
            canvas.renderAll();
        }

        // Lisää teksti
        function lisaaTeksti() {
            var teksti = new fabric.IText('EN MÄ PÄÄSEKÄN', {
                left: 200,
                top: 50,
                fontSize: 16,
                fontFamily: 'Arial',
                fill: 'black'
            });
            canvas.add(teksti);
            canvas.setActiveObject(teksti);
            canvas.renderAll();
        }

        // Lisää seinä
        function lisaaSeina() {
            var seina = new fabric.Rect({
                left: 50,
                top: 50,
                fill: '#7f8c8d',
                width: 15,
                height: 200
            });
            canvas.add(seina);
            canvas.renderAll();
        }

        // Poista valittu objekti
        function poistaValittu() {
            var aktiivinen = canvas.getActiveObject();
            if (aktiivinen) {
                canvas.remove(aktiivinen);
                canvas.renderAll();
            }
        }

        // Tallenna kuva
        function tallennaKuva() {
            var dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1
            });
            var link = document.createElement('a');
            link.download = 'sarjakuva.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
